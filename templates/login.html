{% extends "base.html" %}

{% block title %}Login - CampusFind{% endblock %}

{% block extra_css %}
<style>
.auth-wrapper {
    max-width: 450px;
    margin: 60px auto;
    padding: 30px;
    background: rgba(255, 255, 255, 0.65);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.03);
    box-sizing: border-box;
}

.auth-title {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 800;
    color: #0f172a;
    margin: 0 0 8px 0;
    letter-spacing: -0.5px;
}

.auth-subtitle {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin: 0 0 25px 0;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.form-group label {
    font-size: 13.5px;
    font-weight: 600;
    color: #475569;
}

.auth-form input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;
    border: 1.5px solid #334155;
    background: transparent;
    color: #0f172a;
    transition: all 0.25s ease-in-out;
}

.auth-form input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2px;
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

.checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    margin: 0;
    cursor: pointer;
    accent-color: #4f46e5;
}

.checkbox-group label {
    font-size: 13.5px;
    font-weight: 500;
    color: #475569;
    cursor: pointer;
}

.forgot-link {
    font-size: 13.5px;
    font-weight: 600;
    color: #4f46e5;
    text-decoration: none;
}

.forgot-link:hover {
    text-decoration: underline;
}

.auth-form button {
    background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
    color: #ffffff;
    font-weight: 600;
    border: none;
    cursor: pointer;
    padding: 14px;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
    transition: all 0.2s ease;
    margin-top: 10px;
    font-size: 15px;
}

.auth-form button:hover {
    background: linear-gradient(135deg, #4338ca 0%, #2563eb 100%);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25);
}

.auth-redirect {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-top: 20px;
}

.auth-redirect a {
    color: #4f46e5;
    text-decoration: none;
    font-weight: 600;
}

.auth-redirect a:hover {
    text-decoration: underline;
}

@media (max-width: 500px) {
    .auth-wrapper {
        margin: 40px 10px;
        padding: 20px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Sign in to find or report your belongings</p>
    
    <form class="auth-form" method="POST" action="/login">
        <div class="form-group">
            <label for="email">Campus Email Address</label>
            <input type="email" id="email" name="email" required placeholder="name@college.edu">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>
        
        <div class="form-options">
            <div class="checkbox-group">
                <input type="checkbox" id="remember_me" name="remember_me">
                <label for="remember_me">Remember Me</label>
            </div>
            <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
        </div>
        
        <button type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    </form>
    
    <div class="auth-redirect">
        Don't have an account yet? <a href="/register">Register here</a>
    </div>
</div>
{% endblock %}
